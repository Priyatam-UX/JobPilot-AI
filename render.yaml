services:
  # FastAPI Backend Web Service
  - type: web
    name: jobpilot-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: 43200
      - key: CORS_ORIGINS
        value: '["https://job-pilot-ai-priyatam-ux.vercel.app", "https://jobspilotai.space", "https://www.jobspilotai.space", "http://localhost:5173"]'
      - key: PROJECT_NAME
        value: "AI Job Copilot"
      - key: API_V1_STR
        value: "/api/v1"
      - key: USE_S3
        value: false
